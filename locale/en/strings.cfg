[tips-and-tricks-item-description]
enemy_erm_redarmy-general-info=X years ago, you, the engineer, were one of the most famous figure on planet Earth.  You had the control of the most powerful industries.  The president of the most powerful country was your puppet.  You then did something bizarre. Everyone affected by your actions formed "Red Army".  They tried to hunt you down from the sky to the caves.  You had no other choice but to escape with your only spaceship.   
enemy_erm_redarmy-planet-earth=Your previous home planet.  Did you miss it?  But everyone in the planet want to kill you tho.\n\nThis is an end game planet. Your weapon damage upgrades should be at least level 12 and have a decent size army when you venture to this planet.
enemy_erm_redarmy-economy=Some spawners, at greater or higher tier, now drop organs.  Organs are used to bridge the gap for biter eggs.  They can also used for other new recipes.
enemy_erm_redarmy-city-and-town=This feature only apply to Planet Earth.\n\nRed army can build different types of towns and cities.\n\n[Town]\nTowns starts to spawn after 512 tiles from your spawn point.\n\nNormal size (32 tiles wide) town may include [entity=enemy_erm_redarmy--tesla-turret--5] that only builds with city and town.  Larger town (48 tiles wide) may build further out, starting at 1 KM from your spawn.  Once you reach 1.5KM, town with [entity=enemy_erm_redarmy--artillery-turret--5] may spawn.\n\n[City]\nCities are built on Factorio World's spawn city locations. Normal city are 64 tile wide.\nCity with [entity=enemy_erm_redarmy--artillery-turret--5] starts to spawn at 1KM away from player spawn.\nCity with [entity=enemy_erm_redarmy--rocket-silo--5] starts to spawn at 2.5KM away from player spawn.\n\n[Enemy base expansion] When enemy arrive its base expansion destination and the location beside a city/town beacon (64 tiles radius), they will immediately build a city or town.
enemy_erm_redarmy-rocket-silo= [entity=enemy_erm_redarmy--rocket-silo--5] only spawn on Planet Earth.  They spawn as part of a city\n\nThe city feed rocket parts at a fixed interval. You can adjust the interval in start up setting.  Once all rocket parts has been loaded, it will fire a nuclear rocket at one of your base location.
enemy_erm_redarmy-boss-rocket-silo=Boss variant of rocket silo.  You have to place a [entity=enemy_erm_redarmy--psi-radar] from a distance between 500 - 1000 tiles.  Once you placed the radar, the rocket silo in the city will become boss variant immediately.  Plan your defense first before placing the radar. :) 
enemy_erm_redarmy-artillery-turret=[entity=enemy_erm_redarmy--artillery-turret--5] only spawn on Planet Earth. They spawn as part of a town or a city.\n\nThe town reload its ammo at a fixed interval. You can adjust the interval in start up setting.  When it reloads, there is a chance that it triggers a scripted attack to your base. 


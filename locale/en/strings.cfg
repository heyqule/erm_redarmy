[mod-setting-description]
enemy_erm_redarmy-map-color=Define Map Color.
enemy_erm_redarmy-large-town-spawn-chance=For planet earth only\n\nLarge Town Spawn Chance
enemy_erm_redarmy-artillery-refuel=For planet earth only\n\nHow often rocket silo refuel 6 ammo in minute(s).
enemy_erm_redarmy-artillery-manual-fire-chance=For planet earth only\n\nWhen artillery refuel ammo, there is a chance to trigger manual fire to an enemy destination.  Range up to 1.5KM.
enemy_erm_redarmy-artillery-town-spawn-chance=For planet earth only\n\nArtillery town can spawn 1.5 KM away from player's spawn.
enemy_erm_redarmy-artillery-city-spawn-chance=For planet earth only\n\nArtillery city can spawn 1 KM away from player's spawn.
enemy_erm_redarmy-atomic-rocket-refuel=For planet earth only\n\nHow often rocket silo refuel 10 rocket part in minute(s).  Once it hit 100, it fires an atomic rocket to a 'player' destination.
enemy_erm_redarmy-atomic-city-spawn-chance=For planet earth only\n\nAtomic city can spawn 2 KM away from player's spawn.\n\nBoss mode depends on this spawn, you place the redarmy boss radar between 600 - 1200m away from the rocket silo.
enemy_erm_redarmy-orbital-surveillance=For planet earth only\n\nDetect enemy location when the enemy do a scripted artillery fire and nuclear bomb launch.  It ping a blinking icon of artillery or rocket-silo on the map.  The icon expires after 2 minutes.

